services:
  postgres:
    image: postgres:16-alpine
    container_name: docklylogistics-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: docklylogistics
      POSTGRES_PASSWORD: docklylogistics
      POSTGRES_DB: docklylogistics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docklylogistics"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: docklylogistics-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://docklylogistics:docklylogistics@postgres:5432/docklylogistics?schema=docklylogistics
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_TENANT: demo
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
    ports:
      - "3000:3000"
    profiles: ["full"]

volumes:
  pgdata:
